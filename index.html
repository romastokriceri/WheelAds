<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Шины и диски — каталог</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f7f7f5;
      --bg3: #f0efeb;
      --text: #1a1a18;
      --text2: #6b6b67;
      --text3: #a0a09c;
      --border: rgba(0,0,0,0.10);
      --border2: rgba(0,0,0,0.18);
      --radius: 8px;
      --radius-lg: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .hero {
      padding: 3rem 0 2rem;
      border-bottom: 0.5px solid var(--border);
      margin-bottom: 2rem;
    }
    .hero h1 {
      font-size: 28px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.3rem;
      letter-spacing: -0.02em;
    }
    .hero-sub { font-size: 15px; color: var(--text2); }
    .hero-meta { font-size: 13px; color: var(--text3); margin-top: 8px; }

    .sizes-label {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.09em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .sizes-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 2.75rem;
    }
    .size-pill {
      display: inline-block;
      padding: 7px 16px;
      border-radius: 999px;
      border: 0.5px solid var(--border2);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.12s, border-color 0.12s;
    }
    .size-pill:hover {
      background: var(--bg2);
      border-color: rgba(0,0,0,0.3);
    }

    .section {
      margin-bottom: 3rem;
      scroll-margin-top: 16px;
    }
    .section-header {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 0.5px solid var(--border);
    }
    .section-title {
      font-size: 20px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .section-count { font-size: 13px; color: var(--text3); }
    .season-tag {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 999px;
      border: 0.5px solid var(--border);
      color: var(--text3);
    }

    .wheel-list { display: flex; flex-direction: column; }

    /* Sub-label when multiple full sizes exist within one Zoll group */
    .size-sublabel {
      font-size: 12px;
      color: var(--text3);
      letter-spacing: 0.04em;
      margin-top: 12px;
      margin-bottom: 2px;
      padding-bottom: 4px;
      border-bottom: 0.5px dashed var(--border);
    }

    .wheel-item {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 0.5px solid var(--border);
    }
    .wheel-item:last-child { border-bottom: none; }

    .wheel-id {
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 5px 8px;
      text-align: center;
      white-space: nowrap;
    }

    .wheel-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 3px;
    }
    .wheel-meta {
      font-size: 13px;
      color: var(--text2);
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
    }
    .dot-sep { color: var(--text3); }

    .tread-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 3px;
      flex-shrink: 0;
    }
    .tread-good { background: #5a9020; }
    .tread-mid  { background: #c07810; }
    .tread-low  { background: #d94040; }

    .wheel-right { text-align: right; flex-shrink: 0; }
    .wheel-price {
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      display: block;
    }
    .wheel-set { font-size: 12px; color: var(--text3); margin-top: 2px; }

    .back-top {
      display: inline-block;
      margin-top: 0.75rem;
      font-size: 13px;
      color: var(--text3);
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      text-decoration: underline;
      text-decoration-color: transparent;
      transition: color 0.12s, text-decoration-color 0.12s;
    }
    .back-top:hover {
      color: var(--text2);
      text-decoration-color: var(--border2);
    }

    .footer {
      border-top: 0.5px solid var(--border);
      padding: 1.5rem 0 2.5rem;
      margin-top: 2rem;
      font-size: 13px;
      color: var(--text3);
    }

    .state-msg { font-size: 15px; color: var(--text2); padding: 3rem 0; }
    .state-error { color: #d94040; }

    @media (max-width: 600px) {
      .hero { padding: 2rem 0 1.5rem; }
      .hero h1 { font-size: 22px; }
      .wheel-item { grid-template-columns: 46px 1fr auto; gap: 10px; }
      .wheel-price { font-size: 14px; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="hero">
    <h1>Шины и диски</h1>
    <p class="hero-sub">Выберите размер — найдите нужное колесо</p>
    <p class="hero-meta" id="hero-meta">Загружаем данные…</p>
  </div>

  <div id="sizes-section" style="display:none">
    <div class="sizes-label">Доступные размеры</div>
    <div class="sizes-grid" id="sizes-grid"></div>
  </div>

  <div id="main-content"></div>

  <div class="footer">
    Данные обновляются автоматически из таблицы.
    Чтобы связаться с продавцом — укажите ID лота.
  </div>

</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSNWYk70vz6RsWbSl_4yU4XO1NanPFl_MeIbDV6HtRRsRNGK0SHsbAyNoTDsgrSOiFetXgkU1e9GHy8/pub?gid=1467628040&single=true&output=csv";

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  return lines.map(line => {
    const cells = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cells.push(cur.trim());
    return cells;
  });
}

function dotToYear(dot) {
  if (!dot || dot === '0') return null;
  const s = String(dot).replace(/\D/g, '');
  let year = null;
  if (s.length === 4) year = parseInt('20' + s.slice(2));
  else if (s.length === 3) year = parseInt('200' + s.slice(2));
  if (!year) return null;
  return year >= 2019 ? String(year) : null;
}

function parseTread(val) {
  if (!val || val === '#DIV/0!' || val === '') return null;
  return parseFloat(val.replace(',', '.'));
}

function treadClass(v) {
  if (v === null) return null;
  if (v >= 7) return 'tread-good';
  if (v >= 5) return 'tread-mid';
  return 'tread-low';
}

function seasonRu(s) {
  if (!s) return '';
  const l = s.toLowerCase();
  if (l === 'sommer') return 'Лето';
  if (l === 'winter') return 'Зима';
  if (l.includes('ganz') || l.includes('all')) return 'Всесезон';
  return s;
}

// "195/60 R18" → "195/60"  (everything before the first space+R or just return as-is)
function shortSize(size) {
  const m = size.match(/^(.+?)\s+R\d/i);
  return m ? m[1] : size;
}

// "18" or "18 Zoll" → "R18"
function zollLabel(z) {
  const n = String(z).replace(/[^\d]/g, '');
  return n ? 'R' + n : z;
}

function makeAnchor(z) {
  return 'r' + String(z).replace(/[^\d]/g, '');
}

async function loadAndRender() {
  const content = document.getElementById('main-content');
  const heroMeta = document.getElementById('hero-meta');

  try {
    const resp = await fetch(CSV_URL);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    const rows = parseCSV(text);

    let headerIdx = -1;
    for (let i = 0; i < rows.length; i++) {
      if (rows[i].some(c => c === 'Status')) { headerIdx = i; break; }
    }
    if (headerIdx === -1) throw new Error('Заголовок не найден');

    const h = rows[headerIdx].map(c => c.trim());
    const col = name => h.findIndex(c => c === name);

    const iStatus = col('Status');
    const iID     = col('ID');
    const iMarke  = col('Marke');
    const iModell = col('Modell');
    const iGröße  = col('Größe');
    const iZoll   = col('Zoll');
    const iDot    = col('Dot');
    const iSaison = col('Saison');
    const iAnzahl = col('Anzahl im Set');
    const iDurch  = col('Durchschnitt');
    const iPreis  = col('Preis');

    const wheels = [];
    for (let i = headerIdx + 1; i < rows.length; i++) {
      const r = rows[i];
      if (!r || r.every(c => !c)) continue;
      const status = (r[iStatus] || '').trim();
      if (status === 'Продано') continue;
      const id = (r[iID] || '').trim();
      if (!id) continue;
      wheels.push({
        id,
        marke:  (r[iMarke]  || '').trim(),
        modell: (r[iModell] || '').trim(),
        size:   (r[iGröße]  || '').trim(),
        zoll:   (iZoll !== -1 ? r[iZoll] : '').trim(),
        dot:    (r[iDot]    || '').trim(),
        saison: (r[iSaison] || '').trim(),
        anzahl: (r[iAnzahl] || '').trim(),
        durch:  parseTread(r[iDurch] || ''),
        preis:  (r[iPreis]  || '').trim(),
      });
    }

    if (!wheels.length) {
      heroMeta.textContent = 'Нет доступных позиций';
      return;
    }

    // Group by Zoll
    const byZoll = {};
    wheels.forEach(w => {
      const key = w.zoll || '?';
      if (!byZoll[key]) byZoll[key] = [];
      byZoll[key].push(w);
    });

    // Sort Zoll keys numerically
    const zolls = Object.keys(byZoll).sort((a, b) =>
      (parseInt(a) || 0) - (parseInt(b) || 0)
    );

    heroMeta.textContent = `${wheels.length} позиций · ${zolls.length} размеров`;

    // Pills
    const sizesSection = document.getElementById('sizes-section');
    sizesSection.style.display = 'block';
    const sizesGrid = document.getElementById('sizes-grid');
    zolls.forEach(z => {
      const a = document.createElement('a');
      a.className = 'size-pill';
      a.textContent = zollLabel(z);
      a.href = '#' + makeAnchor(z);
      sizesGrid.appendChild(a);
    });

    // Sections
    content.innerHTML = '';
    zolls.forEach(z => {
      const items = byZoll[z];
      items.sort((a, b) => a.size.localeCompare(b.size));

      const sec = document.createElement('div');
      sec.className = 'section';
      sec.id = makeAnchor(z);

      // Header
      const seasons = [...new Set(items.map(w => seasonRu(w.saison)).filter(Boolean))];
      const hdr = document.createElement('div');
      hdr.className = 'section-header';
      hdr.innerHTML =
        `<span class="section-title">${zollLabel(z)}</span>` +
        `<span class="section-count">${items.length} шт.</span>` +
        seasons.map(s => `<span class="season-tag">${s}</span>`).join('');
      sec.appendChild(hdr);

      // Sub-group by full Größe within the Zoll section
      const bySize = {};
      items.forEach(w => {
        if (!bySize[w.size]) bySize[w.size] = [];
        bySize[w.size].push(w);
      });
      const sizes = Object.keys(bySize).sort((a, b) => a.localeCompare(b));
      const multiSize = sizes.length > 1;

      const list = document.createElement('div');
      list.className = 'wheel-list';

      sizes.forEach(sz => {
        // Show full-size sub-label only when there are multiple sizes in this Zoll group
        if (multiSize) {
          const lbl = document.createElement('div');
          lbl.className = 'size-sublabel';
          lbl.textContent = sz;
          list.appendChild(lbl);
        }

        bySize[sz].forEach(w => {
          const item = document.createElement('div');
          item.className = 'wheel-item';

          const year = dotToYear(w.dot);
          const tc = treadClass(w.durch);
          const treadHtml = tc
            ? `<span class="tread-dot ${tc}"></span>${w.durch} мм<span class="dot-sep">·</span>`
            : '';
          const name = [w.marke, w.modell].filter(Boolean).join(' ');
          // Show only "195/60" part — Zoll is already in the section title
          const displaySize = shortSize(w.size);
          const yearHtml = year ? `${year} г.<span class="dot-sep">·</span>` : '';

          item.innerHTML =
            `<span class="wheel-id">#${w.id}</span>` +
            `<div>
              <div class="wheel-name">${name}</div>
              <div class="wheel-meta">${displaySize}<span class="dot-sep">·</span>${treadHtml}${yearHtml}${seasonRu(w.saison)}</div>
            </div>` +
            `<div class="wheel-right">
              <span class="wheel-price">${w.preis}</span>
              ${w.anzahl ? `<div class="wheel-set">${w.anzahl} шт. в сете</div>` : ''}
            </div>`;

          list.appendChild(item);
        });
      });

      sec.appendChild(list);

      const back = document.createElement('button');
      back.className = 'back-top';
      back.textContent = '↑ К размерам';
      back.onclick = () => document.querySelector('.hero').scrollIntoView({ behavior: 'smooth' });
      sec.appendChild(back);

      content.appendChild(sec);
    });

  } catch (e) {
    heroMeta.textContent = '';
    content.innerHTML = `<p class="state-msg state-error">Ошибка загрузки данных: ${e.message}</p>`;
  }
}

loadAndRender();
</script>
</body>
</html>
